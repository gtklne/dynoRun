<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="theme-color" content="#09090b">
<meta name="description" content="A suite of motorsport telemetry tools.">
<meta property="og:title" content="wasgoht — telemetry suite">
<meta property="og:description" content="A suite of motorsport telemetry tools.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://wasgoht.ch/">
<title>wasgoht — telemetry suite</title>
<style>
:root{
  --bg:#09090b;
  --surface:#141416;
  --surface-2:#1b1b1e;
  --line:#2a2a2e;
  --line-strong:#3a3a40;
  --ink:#f4f4f5;
  --ink-2:#a1a1aa;
  --ink-3:#71717a;
  --radius:18px;
  --mono:"SFMono-Regular",ui-monospace,Menlo,Consolas,monospace;
  --sans:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
}
*{box-sizing:border-box}
html,body{margin:0;min-height:100%}
body{
  background:
    radial-gradient(1100px 520px at 12% -10%, #1c1c2160, transparent),
    radial-gradient(900px 500px at 100% 0%, #17222b55, transparent),
    var(--bg);
  color:var(--ink);
  font-family:var(--sans);
  -webkit-font-smoothing:antialiased;
  line-height:1.5;
}
a{color:inherit;text-decoration:none}
.wrap{max-width:1080px;margin:0 auto;padding:clamp(28px,6vw,72px) 22px 64px}

/* ---------- header ---------- */
header{display:flex;align-items:center;gap:15px;margin-bottom:clamp(28px,5vw,52px)}
.mark{
  width:46px;height:46px;border-radius:13px;flex:0 0 auto;
  background:conic-gradient(from 210deg,#0ca30c,#fab219,#d03b3b,#3987e5,#0ca30c);
  box-shadow:inset 0 0 0 4px var(--bg),0 0 0 1px var(--line-strong);
}
.brand h1{margin:0;font-size:19px;font-weight:680;letter-spacing:-0.02em}
.brand p{margin:2px 0 0;color:var(--ink-3);font-size:12.5px;letter-spacing:.02em}
.brand .dot{color:var(--ink-2)}

/* ---------- app grid ---------- */
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(268px,1fr));gap:16px}
.tile{
  position:relative;display:flex;flex-direction:column;
  background:linear-gradient(180deg,var(--surface),#101012);
  border:1px solid var(--line);border-radius:var(--radius);
  padding:20px 20px 18px;overflow:hidden;
  transition:border-color .16s ease,transform .16s ease,box-shadow .16s ease;
}
.tile::before{ /* accent wash, fades in on hover */
  content:"";position:absolute;inset:0;opacity:.0;pointer-events:none;
  background:radial-gradient(420px 220px at 20% -20%, var(--accent), transparent 70%);
  transition:opacity .18s ease;
}
.tile:hover{transform:translateY(-3px);border-color:var(--line-strong);
  box-shadow:0 14px 40px -18px #000,0 0 0 1px var(--accent) inset}
.tile:hover::before{opacity:.12}
.tile:focus-visible{outline:2px solid var(--accent);outline-offset:2px}
.tile[aria-disabled="true"]{opacity:.55;pointer-events:none}

.icon{
  width:52px;height:52px;border-radius:14px;flex:0 0 auto;
  display:flex;align-items:center;justify-content:center;font-size:26px;line-height:1;
  background:linear-gradient(155deg,color-mix(in srgb,var(--accent) 85%,#fff 0%),color-mix(in srgb,var(--accent) 60%,#000 40%));
  box-shadow:inset 0 1px 0 #ffffff30,0 6px 16px -8px var(--accent);
}
.trow{display:flex;align-items:center;justify-content:space-between;gap:12px;margin-bottom:14px}
.pill{
  font-family:var(--mono);font-size:10.5px;letter-spacing:.06em;text-transform:uppercase;
  padding:4px 8px;border-radius:999px;border:1px solid var(--line-strong);color:var(--ink-2);
  display:inline-flex;align-items:center;gap:6px;white-space:nowrap;
}
.pill .led{width:6px;height:6px;border-radius:50%;background:currentColor}
.pill.live{color:#4ade80;border-color:#4ade8040}
.pill.beta{color:#fbbf24;border-color:#fbbf2440}
.pill.soon{color:var(--ink-3)}
.tile h2{margin:0;font-size:16.5px;font-weight:640;letter-spacing:-0.01em}
.tile p{margin:6px 0 0;color:var(--ink-2);font-size:13.5px}
.foot{margin-top:auto;padding-top:16px;display:flex;align-items:center;justify-content:space-between}
.open{font-size:13px;color:var(--ink-2);font-weight:560;display:inline-flex;align-items:center;gap:6px;
  transition:gap .16s ease,color .16s ease}
.tile:hover .open{color:var(--ink);gap:10px}
.host{font-family:var(--mono);font-size:11px;color:var(--ink-3)}

footer{margin-top:44px;color:var(--ink-3);font-size:12px}
footer a{color:var(--ink-2);text-decoration:underline;text-underline-offset:2px}
@media(max-width:420px){.wrap{padding-top:34px}.grid{grid-template-columns:1fr}}
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="mark" aria-hidden="true"></div>
    <div class="brand">
      <h1 id="suiteName">wasgoht</h1>
      <p id="suiteTagline">telemetry suite <span class="dot">·</span> pick a tool</p>
    </div>
  </header>

  <main class="grid" id="grid" aria-label="Applications"></main>

  <footer>
    Everything runs in your browser. Built by Johannes Nothstein.
  </footer>
</div>

<script>
"use strict";
/* ============================================================
   SUITE HOMESCREEN — config-driven app launcher.
   To add an app: append one object below, deploy its static
   files to /var/www/<id>/, and add an nginx `location /<id>/`.
   Fields: id, title, blurb, path, accent, icon, status?, host?
   status ∈ 'live' | 'beta' | 'soon' (soon = shown, not clickable)
   ============================================================ */
const SUITE = { name: "wasgoht", tagline: "telemetry suite · pick a tool" };

const APPS = [
  {
    id: "dynorun",
    title: "DynoRun",
    blurb: "GPS virtual dyno — drive one gear, get a wheel-power curve.",
    path: "/dynorun/",
    accent: "#f59e0b",
    icon: "📈",
    status: "live",
  },
  {
    id: "grip",
    title: "Grip Utilization",
    blurb: "RaceBox track-session traction-circle & grip analyzer.",
    path: "/grip/",
    accent: "#3987e5",
    icon: "🏁",
    status: "live",
  },
  // Example — uncomment and adjust to add a new app:
  // {
  //   id: "dagps", title: "daGPS", blurb: "…", path: "/dagps/",
  //   accent: "#199e70", icon: "🛰️", status: "soon",
  // },
];

const STATUS_LABEL = { live: "live", beta: "beta", soon: "soon" };

function tile(app){
  const status = app.status || "live";
  const clickable = status !== "soon";
  const el = document.createElement(clickable ? "a" : "div");
  el.className = "tile";
  el.style.setProperty("--accent", app.accent);
  if (clickable){ el.href = app.path; }
  else { el.setAttribute("aria-disabled", "true"); }

  const host = app.host || (location.host + app.path);
  el.innerHTML = `
    <div class="trow">
      <div class="icon" aria-hidden="true">${app.icon || "▭"}</div>
      <span class="pill ${status}">${status !== "soon" ? '<span class="led"></span>' : ""}${STATUS_LABEL[status] || status}</span>
    </div>
    <h2>${app.title}</h2>
    <p>${app.blurb}</p>
    <div class="foot">
      <span class="open">${clickable ? "Open" : "Coming soon"}${clickable ? " <span aria-hidden='true'>→</span>" : ""}</span>
      <span class="host">${host}</span>
    </div>`;
  return el;
}

(function render(){
  document.getElementById("suiteName").textContent = SUITE.name;
  document.getElementById("suiteTagline").innerHTML =
    SUITE.tagline.replace("·", '<span class="dot">·</span>');
  document.title = `${SUITE.name} — ${SUITE.tagline.split("·")[0].trim()}`;
  const grid = document.getElementById("grid");
  APPS.forEach(a => grid.appendChild(tile(a)));
})();
</script>
</body>
</html>
