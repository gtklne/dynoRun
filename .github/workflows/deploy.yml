name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_TURNSTILE_SITE_KEY: ${{ secrets.TURNSTILE_SITE_KEY }}

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy frontend
        run: |
          rsync -rlgoDzv --delete -e "ssh -i ~/.ssh/id_ed25519" dist/ "deploy@${{ secrets.DEPLOY_HOST }}:/var/www/dynorun/"

  deploy-api:
    needs: deploy
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: server/package-lock.json

      - name: Build API
        run: |
          cd server && npm ci && npm run build

      - name: Set up SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.DEPLOY_HOST }}" >> ~/.ssh/known_hosts

      - name: Deploy API files
        run: |
          rsync -rlgoDzv --delete -e "ssh -i ~/.ssh/id_ed25519" \
            --exclude 'node_modules' \
            server/dist/ "deploy@${{ secrets.DEPLOY_HOST }}:/opt/dynorun-api/dist/"
          rsync -rlgoDzv -e "ssh -i ~/.ssh/id_ed25519" \
            server/package.json server/package-lock.json server/drizzle.config.ts \
            "deploy@${{ secrets.DEPLOY_HOST }}:/opt/dynorun-api/"
          ssh -i ~/.ssh/id_ed25519 "deploy@${{ secrets.DEPLOY_HOST }}" \
            "mkdir -p /opt/dynorun-api/src"
          rsync -rlgoDzv -e "ssh -i ~/.ssh/id_ed25519" \
            server/src/schema.ts \
            "deploy@${{ secrets.DEPLOY_HOST }}:/opt/dynorun-api/src/schema.ts"

      - name: Migrate database schema
        run: |
          # Install full deps (incl. drizzle-kit) as root so we can also read
          # /etc/dynorun.env for DATABASE_URL. Pruned back to prod-only after.
          # drizzle-kit push sometimes exits 0 even when it bailed on an
          # interactive prompt or data-loss warning, so we capture the output
          # and explicitly fail on those phrases.
          ssh -i ~/.ssh/id_ed25519 "root@${{ secrets.DEPLOY_HOST }}" '
            set -euo pipefail
            cd /opt/dynorun-api
            npm ci
            set -a && . /etc/dynorun.env && set +a
            OUTPUT=$(npx drizzle-kit push 2>&1)
            echo "$OUTPUT"
            if echo "$OUTPUT" | grep -qE "Error:|data-loss|cannot be reverted|Interactive prompts"; then
              echo ""
              echo "ERROR: drizzle-kit push reported a problem (see above)."
              echo "       Inspect the diff, apply destructive changes manually, then re-deploy."
              exit 1
            fi
            npm prune --omit=dev
            chown -R deploy:deploy /opt/dynorun-api
          '

      - name: Restart API
        run: |
          ssh -i ~/.ssh/id_ed25519 "deploy@${{ secrets.DEPLOY_HOST }}" \
            "sudo systemctl restart dynorun-api"
