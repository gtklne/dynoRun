<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#09090b" />
    <meta name="description" content="GPS-based virtual dyno. Your phone is a dyno." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="apple-touch-icon" href="/favicon.svg" />
    <!-- Open Graph defaults. Social crawlers don't run JS, so /share/:token still
         shows generic preview text — a future SSR pass (nginx subroute → Hono)
         would inject run-specific og:title/og:description. -->
    <meta property="og:site_name" content="DynoRun" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="DynoRun — your phone is a dyno" />
    <meta property="og:description" content="GPS-based virtual dyno. Drive in one gear; the app derives a wheel-power curve." />
    <meta property="og:url" content="https://wasgoht.ch/dynorun/" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="DynoRun — your phone is a dyno" />
    <meta name="twitter:description" content="GPS-based virtual dyno. Drive in one gear; the app derives a wheel-power curve." />
    <title>DynoRun</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
